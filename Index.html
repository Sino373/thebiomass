<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Line Chef</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f3f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            width: 800px;
            height: 600px;
            background: #fff8f0;
            border: 8px solid #ff9f43;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        /* Top Banner */
        #hud {
            height: 60px;
            background: #ff9f43;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 20px;
            font-weight: bold;
        }
        /* Customers Zone */
        #customers-zone {
            height: 180px;
            display: flex;
            align-items: flex-end;
            padding: 10px;
            gap: 20px;
            background: #fff;
            border-bottom: 4px dashed #ffeaec;
        }
        .customer {
            width: 110px;
            background: #f8f9fa;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .avatar { font-size: 36px; margin-bottom: 5px; }
        .bubble {
            background: #fff;
            border: 2px solid #54a0ff;
            border-radius: 8px;
            padding: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .patience-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }
        .patience-fill {
            width: 100%;
            height: 100%;
            background: #10ac84;
            transition: width 0.1s linear, background-color 0.5s ease;
        }
        /* Kitchen Counters */
        #kitchen-counter {
            height: 360px;
            background: #fdf2e9;
            position: relative;
            padding: 20px;
        }
        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #84817a;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        /* Grid Alignment */
        #workspace {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 20px;
            height: 100%;
        }
        .station {
            background: rgba(255,255,255,0.6);
            border: 2px solid #dcdde1;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }
        /* Ingredient Bins */
        .bin-grid, .plate-grid, .stove-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            flex-grow: 1;
        }
        .bin {
            background: #fff;
            border: 3px solid #54a0ff;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        .bin:active { transform: scale(0.95); }
        .bin-icon { font-size: 32px; }
        /* Stoves */
        .stove {
            background: #2f3640;
            border-radius: 8px;
            border: 3px solid #718093;
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 13px;
        }
        .stove.cooking { border-color: #ee5253; background: #3d3d3d; }
        .stove.cooked { border-color: #10ac84; background: #222; }
        .stove.burned { border-color: #000; background: #111; color: #ff4d4d; }
        .stove-timer {
            width: 80%;
            height: 6px;
            background: #444;
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
            display: none;
        }
        .stove-timer-fill { width: 0%; height: 100%; background: #ee5253; }
        /* Plates */
        .plate {
            background: #ffffff;
            border: 3px dashed #ff9f43;
            border-radius: 50%;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        .plate.has-food { border-style: solid; background: #fffcf5; }
        .plate-food { font-size: 28px; }
        /* Screens */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .screen h1 { font-size: 48px; margin-bottom: 10px; color: #ff9f43; }
        .screen p { font-size: 20px; margin-bottom: 20px; }
        .btn {
            background: #ff9f43;
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,159,67,0.4);
        }
        .btn:hover { background: #ffaa54; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- HUD Layer -->
    <div id="hud">
        <div id="score-display">Score: 0</div>
        <div id="timer-display">Time: 60</div>
    </div>

    <!-- Gameplay Zones -->
    <div id="customers-zone"></div>
   
    <div id="kitchen-counter">
        <div id="workspace">
            <!-- Left: Raw Ingredients Box -->
            <div class="station">
                <div class="section-title">1. Raw Food</div>
                <div class="bin-grid">
                    <div class="bin" onclick="interactStove('🥩')">
                        <span class="bin-icon">🥩</span><span>Beef</span>
                    </div>
                    <div class="bin" onclick="interactStove('🐟')">
                        <span class="bin-icon">🐟</span><span>Fish</span>
                    </div>
                </div>
            </div>

            <!-- Center: Heat Stoves -->
            <div class="station">
                <div class="section-title">2. Grill Station (Tap Raw Next)</div>
                <div class="stove-grid">
                    <div id="stove-0" class="stove" onclick="clickStove(0)">Empty</div>
                    <div id="stove-1" class="stove" onclick="clickStove(1)">Empty</div>
                </div>
            </div>

            <!-- Right: Plates & Condiments -->
            <div class="station">
                <div class="section-title">3. Assemble & Serve</div>
                <div class="plate-grid">
                    <div id="plate-0" class="plate" onclick="clickPlate(0)">Empty</div>
                    <div id="plate-1" class="plate" onclick="clickPlate(1)">Empty</div>
                </div>
                <div style="display:flex; gap: 5px; margin-top:5px;">
                    <button style="flex:1; padding:5px; font-size:11px;" onclick="addTopping('🧀')">+🧀 Cheese</button>
                    <button style="flex:1; padding:5px; font-size:11px;" onclick="addTopping('🍅')">+🍅 Tomato</button>
                </div>
            </div>
        </div>
    </div>

    <!-- UI Overlay Screens -->
    <div id="start-screen" class="screen">
        <h1>Mini Line Chef</h1>
        <p>Cook dishes, assemble toppings, and serve fast!</p>
        <button class="btn" onclick="startGame()">Start Kitchen</button>
    </div>

    <div id="game-over-screen" class="screen" style="display: none;">
        <h1>Shift Ended!</h1>
        <p id="final-score">Your Final Score: 0</p>
        <button class="btn" onclick="startGame()">Cook Again</button>
    </div>
</div>

<script>
    // Game System Constants & State Variables
    const COOK_TIME = 3000;  // 3 seconds to cook
    const BURN_TIME = 4000;  // 4 seconds more to burn
    const GAME_DURATION = 60; // 60-second shifts

    let score = 0;
    let timeLeft = GAME_DURATION;
    let gameInterval = null;
    let customerSpawnTimeout = null;
    let activeQueues = [];
    let selectedIngredient = null;

    // Entities Arrays
    const recipes = [
        { name: "Steak", base: "🥩", items: ["🥩"], served: "🍖" },
        { name: "Cheesy Steak", base: "🥩", items: ["🥩", "🧀"], served: "🍔" },
        { name: "Fish Fillet", base: "🐟", items: ["🐟"], served: "🍣" },
        { name: "Tomato Fish", base: "🐟", items: ["🐟", "🍅"], served: "🍲" }
    ];

    const customerAvatars = ['🐱', '🐰', '🐻', '🦊', '🦁'];

    let stoves = [
        { id: 0, status: 'idle', food: null, progress: 0, timer: null },
        { id: 1, status: 'idle', food: null, progress: 0, timer: null }
    ];

    let plates = [
        { id: 0, items: [], display: "" },
        { id: 1, items: [], display: "" }
    ];

    // Engine Core Initialization
    function startGame() {
        score = 0;
        timeLeft = GAME_DURATION;
        activeQueues = [];
        selectedIngredient = null;
       
        stoves.forEach((s, idx) => resetStove(idx));
        plates.forEach((p, idx) => resetPlate(idx));
       
        document.getElementById('score-display').innerText = `Score: ${score}`;
        document.getElementById('timer-display').innerText = `Time: ${timeLeft}`;
        document.getElementById('customers-zone').innerHTML = '';
       
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-over-screen').style.display = 'none';

        // Background Core Engines
        gameInterval = setInterval(updateClock, 1000);
        spawnCustomer();
    }

    function updateClock() {
        timeLeft--;
        document.getElementById('timer-display').innerText = `Time: ${timeLeft}`;
        if (timeLeft <= 0) {
            endGame();
        }
    }

    function endGame() {
        clearInterval(gameInterval);
        clearTimeout(customerSpawnTimeout);
        activeQueues.forEach(c => clearInterval(c.intervalId));
        document.getElementById('final-score').innerText = `Your Final Score: ${score}`;
        document.getElementById('game-over-screen').style.display = 'flex';
    }

    // Customer System Mechanics
    function spawnCustomer() {
        if (timeLeft <= 5) return;

        if (activeQueues.length < 4) {
            const randomRecipe = recipes[Math.floor(Math.random() * recipes.length)];
            const randomAvatar = customerAvatars[Math.floor(Math.random() * customerAvatars.length)];
           
            const customer = {
                id: Date.now() + Math.random(),
                avatar: randomAvatar,
                recipe: randomRecipe,
                patience: 100,
                maxPatienceTime: 15000 + (Math.random() * 5000) // 15-20 Seconds
            };

            activeQueues.push(customer);
            renderCustomers();

            // Dynamic Patience Tracking
            const tickRate = 100;
            const lossPerTick = (100 / (customer.maxPatienceTime / tickRate));
           
            customer.intervalId = setInterval(() => {
                customer.patience -= lossPerTick;
                const fillEl = document.getElementById(`patience-fill-${customer.id}`);
                if (fillEl) {
                    fillEl.style.width = `${customer.patience}%`;
                    if (customer.patience < 30) fillEl.style.backgroundColor = '#ee5253';
                    else if (customer.patience < 60) fillEl.style.backgroundColor = '#feca57';
                }

                if (customer.patience <= 0) {
                    clearInterval(customer.intervalId);
                    leaveCustomer(customer.id, false);
                }
            }, tickRate);
        }

        // Randomly chain next wave
        customerSpawnTimeout = setTimeout(spawnCustomer, 3000 + Math.random() * 4000);
    }

    function renderCustomers() {
        const zone = document.getElementById('customers-zone');
        zone.innerHTML = '';
        activeQueues.forEach(c => {
            const div = document.createElement('div');
            div.className = 'customer';
            div.innerHTML = `
                <div class="bubble">Want: ${c.recipe.name}<br>${c.recipe.served}</div>
                <div class="avatar">${c.avatar}</div>
                <div class="patience-bar"><div id="patience-fill-${c.id}" class="patience-fill"></div></div>
            `;
            // Quick-click serve mechanism directly onto customer bounds
            div.onclick = () => tryServeCustomer(c);
            zone.appendChild(div);
        });
    }

    function leaveCustomer(id, servedSuccessful) {
        activeQueues = activeQueues.filter(c => {
            if (c.id === id) {
                clearInterval(c.intervalId);
                return false;
            }
            return true;
        });
        if (servedSuccessful) score += 100;
        document.getElementById('score-display').innerText = `Score: ${score}`;
        renderCustomers();
    }

    // Kitchen Cooking Logic Matrix
    function interactStove(ingredient) {
        selectedIngredient = ingredient;
    }

    function clickStove(index) {
        let stove = stoves[index];
        const el = document.getElementById(`stove-${index}`);
        const barFill = el.querySelector('.stove-timer-fill');

        if (stove.status === 'idle' && selectedIngredient) {
            // Put raw ingredient to stove
            stove.status = 'cooking';
            stove.food = selectedIngredient;
            selectedIngredient = null;
            el.className = 'stove cooking';
            el.innerHTML = `Cooking...<br><span style="font-size:24px">${stove.food}</span><div class="stove-timer"><div class="stove-timer-fill"></div></div>`;
            el.querySelector('.stove-timer').style.display = 'block';

            let elapsed = 0;
            let currentBar = el.querySelector('.stove-timer-fill');
           
            stove.timer = setInterval(() => {
                elapsed += 100;
                let pct = (elapsed / COOK_TIME) * 100;
                currentBar.style.width = `${pct}%`;

                if (elapsed >= COOK_TIME) {
                    clearInterval(stove.timer);
                    triggerCooked(index);
                }
            }, 100);
        }
        else if (stove.status === 'cooked') {
            // Collect completed base food item to an empty plate
            let targetPlate = plates.find(p => p.items.length === 0 || (p.items.length === 1 && p.items[0] === stove.food));
            let openIdx = plates.indexOf(targetPlate);
           
            if (openIdx !== -1) {
                plates[openIdx].items.push(stove.food);
                updatePlateDisplay(openIdx);
                resetStove(index);
            }
        }
        else if (stove.status === 'burned') {
            // Tap to clear out charred food waste
            resetStove(index);
        }
    }

    function triggerCooked(index) {
        let stove = stoves[index];
        let el = document.getElementById(`stove-${index}`);
        stove.status = 'cooked';
        el.className = 'stove cooked';
        el.innerHTML = `READY!<br><span style="font-size:24px">${stove.food === '🥩' ? '🍖' : '🍣'}</span><div class="stove-timer"><div class="stove-timer-fill" style="background:#10ac84"></div></div>`;
       
        let burnElapsed = 0;
        let currentBar = el.querySelector('.stove-timer-fill');
       
        stove.timer = setInterval(() => {
            burnElapsed += 100;
            let pct = 100 - ((burnElapsed / BURN_TIME) * 100);
            currentBar.style.width = `${pct}%`;

            if (burnElapsed >= BURN_TIME) {
                clearInterval(stove.timer);
                stove.status = 'burned';
                el.className = 'stove burned';
                el.innerHTML = `BURNED! 🗑️<br><span style="font-size:24px">🪰</span>`;
            }
        }, 100);
    }

    function resetStove(index) {
        if (stoves[index].timer) clearInterval(stoves[index].timer);
        stoves[index] = { id: index, status: 'idle', food: null, progress: 0, timer: null };
        const el = document.getElementById(`stove-${index}`);
        if(el) {
            el.className = 'stove';
            el.innerHTML = 'Empty';
        }
    }

    // Assembly & Recipe Construction
    function addTopping(topping) {
        // Find plates that have base raw meats cooked but do not have this topping yet
        let targetPlate = plates.find(p => p.items.length > 0 && !p.items.includes(topping));
        if (targetPlate) {
            let idx = plates.indexOf(targetPlate);
            plates[idx].items.push(topping);
            updatePlateDisplay(idx);
        }
    }

    function updatePlateDisplay(index) {
        let plate = plates[index];
        let el = document.getElementById(`plate-${index}`);
       
        // Match visual representations
        let visual = "🍽️";
        if (plate.items.includes('🥩')) visual = '🍖';
        if (plate.items.includes('🐟')) visual = '🍣';
        if (plate.items.includes('🧀') && plate.items.includes('🥩')) visual = '🍔';
        if (plate.items.includes('🍅') && plate.items.includes('🐟')) visual = '🍲';

        plate.display = visual;
        el.className = 'plate has-food';
        el.innerHTML = `<span class="plate-food">${visual}</span><br><span style="font-size:10px">${plate.items.join('+')}</span>`;
    }

    function clickPlate(index) {
        // Tapping an active food item plate directly flushes / trashes the contents
        if (plates[index].items.length > 0) {
            resetPlate(index);
        }
    }

    function resetPlate(index) {
        plates[index] = { id: index, items: [], display: "" };
        const el = document.getElementById(`plate-${index}`);
        if(el) {
            el.className = 'plate';
            el.innerHTML = 'Empty';
        }
    }

    // Fulfillment Verification
    function tryServeCustomer(customer) {
        // Match contents across active work stations
        let matchedPlateIdx = plates.findIndex(p => {
            if (p.items.length !== customer.recipe.items.length) return false;
            return customer.recipe.items.every(item => p.items.includes(item));
        });

        if (matchedPlateIdx !== -1) {
            resetPlate(matchedPlateIdx);
            leaveCustomer(customer.id, true);
        }
    }
</script>
</body>
</html>
